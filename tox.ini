[tox]
envlist = py39,py310,py311,flake8,mypy

[testenv]
deps = 
    pytest
    pytest-cov
    pytest-mock
    pytest-flask
    pytest-asyncio
    pytest-socketio
    coverage[toml]
    -r{toxinidir}/requirements.txt
commands = 
    pytest tests/ -v --cov=backend --cov-report=term-missing --cov-report=html

[testenv:flake8]
deps = flake8
commands = flake8 backend/

[testenv:mypy]
deps = mypy
commands = mypy backend/